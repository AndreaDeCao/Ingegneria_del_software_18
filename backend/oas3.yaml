openapi: 3.0.0
info:
  title: DoloMate API
  version: 2.0.0
  description: |
    API documentation per il progetto **DoloMate** — gestione di treks, attività,
    diario personale, meteo e autenticazione via JWT + OAuth (Google, GitHub).

    ## Autenticazione
    La maggior parte degli endpoint protetti richiede un `accessToken` JWT nell'header:
    ```
    Authorization: Bearer <accessToken>
    ```
    Il token si ottiene tramite `/api/auth/login`, `/api/auth/register` o i flussi OAuth.
    Per rinnovarlo senza re-login usare `/api/auth/refresh` (legge il cookie `refresh_token` httpOnly).

    ## Protezione CSRF
    Gli endpoint sensibili (logout, refresh) richiedono il double-submit cookie:
    1. Chiamare `GET /api/auth/csrf` per ricevere il cookie `csrf_token` e il valore JSON `{ csrfToken }`.
    2. Inviare il valore nell'header `X-CSRF-Token` ad ogni richiesta protetta da CSRF.

    ## Cloudflare Turnstile (CAPTCHA)
    Gli endpoint `/api/auth/register` e `/api/auth/login` richiedono un campo `turnstileToken`
    nel body, ottenuto dal widget Cloudflare Turnstile nel frontend.

    ## Ruoli utente
    - `user` — utente standard (default)
    - `admin` — accesso aggiuntivo a operazioni privilegiate (es. creazione trek)
    
    ## Prefissi route
    | Modulo     | Prefisso        |
    |------------|-----------------|
    | Auth       | /api/auth       |
    | Treks      | /api/treks      |
    | Activities | /api/activities |
    | Diary      | /api/diary      |
    | Weather    | /api/weather    |
    | Users      | /api/users      |
  
    ## Codici di errore comuni
    | Codice | Significato                        |
    |--------|------------------------------------|
    | 400    | Body mancante o non valido         |
    | 401    | Token JWT mancante/scaduto         |
    | 403    | Permessi insufficienti o CSRF      |
    | 404    | Risorsa non trovata                |
    | 409    | Conflitto (email/nickname duplicati)|
    | 500    | Errore interno del server          |
  
    ## Variabili d'ambiente richieste
    - `JWT_ACCESS_SECRET` — secret per firmare gli access token
    - `JWT_REFRESH_SECRET` — secret per i refresh token
    - `TURNSTILE_SECRET_KEY` — chiave Cloudflare Turnstile (backend)
    - `GOOGLE_CLIENT_ID` / `GOOGLE_CLIENT_SECRET` — OAuth Google
    - `GITHUB_CLIENT_ID` / `GITHUB_CLIENT_SECRET` — OAuth GitHub

servers:
  - url: http://localhost:3000
    description: Development server

# ---------------------------------------------------------------------------
# Security schemes
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # -------------------------------------------------------------------------
  # Reusable schemas
  # -------------------------------------------------------------------------
  schemas:

    Error:
      type: object
      description: Risposta di errore generica.
      properties:
        error:
          type: string
          example: "Messaggio di errore descrittivo"

    SafeUser:
      type: object
      description: Dati pubblici dell'utente (senza campi sensibili).
      properties:
        _id:
          type: string
          example: "664a1f2e8b3c4d5e6f7a8b9c"
        nome:
          type: string
          example: "Mario"
        cognome:
          type: string
          nullable: true
          example: "Rossi"
        email:
          type: string
          format: email
          example: "mario.rossi@example.com"
        nickname:
          type: string
          example: "marioR"
        role:
          type: string
          enum: [user, admin]
          example: "user"
        emailVerified:
          type: boolean
          example: false

    AuthResponse:
      type: object
      description: Risposta restituita dopo login o registrazione.
      properties:
        user:
          $ref: '#/components/schemas/SafeUser'
        accessToken:
          type: string
          description: JWT da usare come Bearer token nelle richieste protette.
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    User:
      type: object
      description: Modello completo dell'utente (uso interno/CRUD diretto).
      properties:
        _id:
          type: string
          example: "664a1f2e8b3c4d5e6f7a8b9c"
        nome:
          type: string
          example: "Mario"
        cognome:
          type: string
          nullable: true
          example: "Rossi"
        email:
          type: string
          format: email
          example: "mario.rossi@example.com"
        nickname:
          type: string
          example: "marioR"
        passwordHash:
          type: string
          description: Hash bcrypt della password. Non esposto nelle risposte (select:false).
          example: "$2b$10$..."
        googleId:
          type: string
          nullable: true
          description: ID Google (presente solo se registrato via OAuth Google).
          example: "109876543210987654321"
        githubId:
          type: string
          nullable: true
          description: ID GitHub (presente solo se registrato via OAuth GitHub).
          example: "12345678"
        role:
          type: string
          enum: [user, admin]
          default: user
          description: Ruolo dell'utente nel sistema.
          example: "user"
        emailVerified:
          type: boolean
          default: false
          description: true dopo che l'utente ha cliccato il link di verifica email.
          example: false
        createdAt:
          type: string
          format: date-time
          example: "2025-01-15T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-06-01T14:22:00Z"

    Trek:
      type: object
      description: Percorso/trek nelle Dolomiti.
      required:
        - name
        - difficulty
      properties:
        _id:
          type: string
          example: "664b2c3d9e4f5a6b7c8d9e0f"
        id:
          type: number
          description: ID numerico progressivo univoco (campo separato da `_id` MongoDB).
          example: 42
        name:
          type: string
          example: "Sentiero delle Odle"
        difficulty:
          type: string
          enum: [Facile, Medio, Difficile]
          example: "Medio"
        description:
          type: string
          nullable: true
          example: "Percorso panoramico con vista sulle Odle."
        SatRouteNumber:
          type: string
          nullable: true
          description: Numero di percorso SAT (Società Alpinisti Tridentini), es. "E101".
          example: "3A"
        duration:
          type: string
          nullable: true
          description: Durata stimata (formato libero, es. "3 ore").
          example: "3h 30min"
        lengthKm:
          type: number
          nullable: true
          example: 12.5
        elevationGain:
          type: string
          nullable: true
          description: Dislivello positivo (formato stringa, es. "650 m").
          example: "650 m"
        startPoint:
          type: string
          nullable: true
          example: "Malga Zannes"
        endPoint:
          type: string
          nullable: true
          example: "Rifugio Genova"
        comuni:
          type: array
          items:
            type: string
          description: Comuni attraversati dal percorso.
          example: ["Funes", "Val di Funes"]
        minAltitude:
          type: number
          nullable: true
          description: Quota minima in metri.
          example: 1350
        maxAltitude:
          type: number
          nullable: true
          description: Quota massima in metri.
          example: 2500
        coordinates:
          type: object
          description: Coordinate GPS del punto di riferimento del trek.
          properties:
            lat:
              type: number
              example: 46.6171
            lon:
              type: number
              example: 11.7570
        condizioniAttuali:
          type: string
          nullable: true
          description: Aggiornamento manuale sulle condizioni del sentiero.
          example: "Sentiero aperto, neve residua sopra i 2000m."
        createdBy:
          type: string
          nullable: true
          description: _id dell'utente (admin) che ha creato il trek.
          example: "664a1f2e8b3c4d5e6f7a8b9c"

    Activity:
      type: object
      description: Attività/escursione organizzata da un utente su un trek.
      required:
        - title
        - activityDate
        - status
      properties:
        _id:
          type: string
          example: "664c3d4e0f1a2b3c4d5e6f7a"
        id:
          type: number
          description: ID numerico progressivo.
          example: 7
        title:
          type: string
          example: "Escursione alle Odle - Giugno 2025"
        description:
          type: string
          nullable: true
          example: "Uscita di gruppo con pranzo al sacco al rifugio."
        activityDate:
          type: string
          format: date-time
          example: "2025-06-15T08:00:00Z"
        maxParticipants:
          type: number
          nullable: true
          example: 10
        status:
          type: string
          enum: [Aperto, Chiuso, Annullato]
          example: "Aperto"
        organizerID:
          type: string
          nullable: true
          description: _id dell'utente organizzatore (ref User).
          example: "664a1f2e8b3c4d5e6f7a8b9c"
        trekID:
          type: string
          nullable: true
          description: _id del trek associato (ref Trek).
          example: "664b2c3d9e4f5a6b7c8d9e0f"

    DiaryEntry:
      type: object
      description: Voce del diario personale dell'utente relativa a un'escursione.
      required:
        - titolo
        - data
      properties:
        _id:
          type: string
          example: "664d4e5f1a2b3c4d5e6f7a8b"
        userId:
          type: string
          description: _id dell'utente proprietario della voce (impostato dal token, non dal body).
          example: "664a1f2e8b3c4d5e6f7a8b9c"
        trekId:
          type: string
          nullable: true
          description: _id del trek associato (opzionale, ref Trek).
          example: "664b2c3d9e4f5a6b7c8d9e0f"
        titolo:
          type: string
          example: "Prima volta alle Odle"
        data:
          type: string
          format: date-time
          example: "2025-06-15T08:00:00Z"
        note:
          type: string
          nullable: true
          example: "Giornata fantastica, cielo limpido e aria fresca."
        foto:
          type: array
          items:
            type: string
          description: Array di URL o percorsi delle foto.
          example: ["https://example.com/foto1.jpg"]
        valutazione:
          type: number
          minimum: 1
          maximum: 5
          nullable: true
          description: Valutazione dell'escursione da 1 a 5.
          example: 5
        completato:
          type: boolean
          default: true
          description: Indica se l'escursione è stata completata.
          example: true
        createdAt:
          type: string
          format: date-time
          example: "2025-06-15T20:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-06-15T21:00:00Z"

    WeatherResponse:
      type: object
      description: Risposta meteo per un trek, con dati dalla stazione più vicina.
      properties:
        trek:
          type: string
          description: Nome del trek richiesto.
          example: "Sentiero delle Odle"
        meteoLocation:
          type: string
          description: Nome della stazione meteo più vicina alle coordinate del trek.
          example: "Bressanone"
        weather:
          type: object
          description: |
            Dati meteo grezzi restituiti dal provider esterno (struttura variabile
            in base alla fonte configurata in `meteoLocations.json`).
          additionalProperties: true

# ---------------------------------------------------------------------------
# Tags
# ---------------------------------------------------------------------------
tags:
  - name: Auth
    description: |
      Autenticazione locale (JWT) e OAuth (Google, GitHub).

      Flusso standard:
      1. `GET /api/auth/csrf` → ottieni `csrfToken` (cookie + JSON)
      2. `POST /api/auth/register` o `POST /api/auth/login` → ricevi `accessToken` + cookie `refresh_token`
      3. Usa `accessToken` nell'header `Authorization: Bearer <token>` per le richieste protette
      4. Rinnova con `POST /api/auth/refresh` (invia header `X-CSRF-Token`)

  - name: Treks
    description: |
      Gestione dei percorsi/trek nelle Dolomiti.
      La creazione è riservata agli utenti con ruolo `admin`.

  - name: Activities
    description: Gestione delle attività/escursioni organizzate dagli utenti.

  - name: Diary
    description: |
      Diario personale dell'utente. Ogni voce può essere associata a un trek.
      Tutti gli endpoint richiedono autenticazione JWT.

  - name: Weather
    description: |
      Meteo in tempo reale per un trek. Il sistema trova automaticamente
      la stazione meteo più vicina alle coordinate del trek.

  - name: Users
    description: CRUD diretto sugli utenti (uso amministrativo).

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # ==========================================================================
  # AUTH
  # ==========================================================================

  /api/auth/csrf:
    get:
      summary: Ottieni il token CSRF
      description: |
        Imposta il cookie `csrf_token` (NON httpOnly, leggibile dal frontend)
        e restituisce lo stesso valore nel body JSON.
        Da chiamare prima di qualsiasi endpoint che richiede `X-CSRF-Token`
        (logout, refresh).
      tags: [Auth]
      responses:
        '200':
          description: Token CSRF generato.
          content:
            application/json:
              schema:
                type: object
                properties:
                  csrfToken:
                    type: string
                    example: "a1b2c3d4e5f6..."

  /api/auth/register:
    post:
      summary: Registra un nuovo utente
      description: |
        Crea un nuovo account con email e password.
        Richiede la verifica Cloudflare Turnstile (`turnstileToken` nel body).
        **Non** restituisce `accessToken` né dati utente: l'account è creato ma non attivo finché
        l'utente non clicca il link di verifica ricevuto via email (`emailVerified: false`).
        Vincoli password: 6–32 caratteri, almeno una lettera e un numero, nessuno spazio.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nome, email, nickname, password, confermaPassword, turnstileToken]
              properties:
                nome:
                  type: string
                  example: "Mario"
                cognome:
                  type: string
                  nullable: true
                  example: "Rossi"
                email:
                  type: string
                  format: email
                  example: "mario.rossi@example.com"
                nickname:
                  type: string
                  example: "marioR"
                password:
                  type: string
                  format: password
                  example: "Password123!"
                confermaPassword:
                  type: string
                  format: password
                  example: "Password123!"
                turnstileToken:
                  type: string
                  description: Token ottenuto dal widget Cloudflare Turnstile nel frontend.
                  example: "xxxxxx..."
      responses:
        '201':
          description: Utente registrato con successo. Inviata email di verifica.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Registrazione completata! Controlla la tua email per verificare l'account."
        '400':
          description: |
            Campi mancanti, email non valida, password non conforme alle regole
            (6–32 caratteri, almeno lettera e numero, nessuno spazio),
            password e confermaPassword non coincidenti, o Turnstile token mancante.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: CAPTCHA Turnstile non valido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email o nickname già in uso (con suggerimento sul metodo di login se account OAuth).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Errore interno del server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/login:
    post:
      summary: Login utente
      description: |
        Autentica un utente con email e password.
        Richiede la verifica Cloudflare Turnstile (`turnstileToken` nel body).
        Restituisce `accessToken` nel body e imposta il cookie httpOnly `refresh_token` (path `/api/auth/refresh`, durata 1h).
        L'`accessToken` ha durata 15 minuti.
        Il login è bloccato se l'email non è ancora verificata (403).
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, turnstileToken]
              properties:
                email:
                  type: string
                  format: email
                  example: "mario.rossi@example.com"
                password:
                  type: string
                  format: password
                  example: "Password123!"
                turnstileToken:
                  type: string
                  description: Token ottenuto dal widget Cloudflare Turnstile nel frontend.
                  example: "0.xxxxxx..."
      responses:
        '200':
          description: Login effettuato con successo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Email, password o Turnstile token mancanti nel body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Credenziali non valide (utente non trovato, password errata, o account senza passwordHash perché creato via OAuth).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: |
            CAPTCHA Turnstile non valido, oppure email non ancora verificata
            (`emailVerified: false` — l'utente deve cliccare il link ricevuto via email).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Errore interno del server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/logout:
    post:
      summary: Logout utente
      description: |
        Invalida il cookie `refresh_token` lato server e lo rimuove dal client.
        Richiede l'header `X-CSRF-Token` (ottenuto da `GET /api/auth/csrf`).
      tags: [Auth]
      parameters:
        - in: header
          name: X-CSRF-Token
          required: true
          schema:
            type: string
          description: Token CSRF ottenuto da GET /api/auth/csrf.
      responses:
        '200':
          description: Logout effettuato con successo.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        '403':
          description: CSRF token mancante o non valido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/refresh:
    post:
      summary: Rinnova l'access token
      description: |
        Legge il cookie httpOnly `refresh_token` (impostato al login, path `/api/auth/refresh`)
        e restituisce un nuovo `accessToken` (durata 15 minuti) senza richiedere le credenziali.
        Richiede l'header `X-CSRF-Token` (verificato dal middleware prima di arrivare al controller).
        Usare quando l'`accessToken` è scaduto.
      tags: [Auth]
      parameters:
        - in: header
          name: X-CSRF-Token
          required: true
          schema:
            type: string
          description: Token CSRF ottenuto da GET /api/auth/csrf.
      responses:
        '200':
          description: Nuovo access token generato.
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '401':
          description: Refresh token mancante nel cookie, non valido o scaduto.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: CSRF token mancante o non valido (bloccato dal middleware, prima del controller).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/me:
    get:
      summary: Dati dell'utente autenticato
      description: |
        Restituisce i dati pubblici dell'utente associato all'`accessToken`.
        **Risponde sempre 200**: se il token è assente, non valido o l'utente non esiste,
        restituisce `{ user: null }` invece di un errore.
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: |
            Dati utente (versione safe, senza campi sensibili).
            Se il token è mancante/non valido restituisce `{ user: null }`.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    nullable: true
                    allOf:
                      - $ref: '#/components/schemas/SafeUser'

  /api/auth/verify-email/{token}:
    get:
      summary: Verifica email utente
      description: |
        L'utente clicca il link ricevuto via email; il server valida il token,
        imposta `emailVerified: true`, invalida il token di verifica e
        **reindirizza al frontend** su `/login?verified=true`.
        Il token scade dopo 24 ore dalla registrazione.
      tags: [Auth]
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
          description: Token di verifica email (hex 32 byte) inviato via email al momento della registrazione.
      responses:
        '302':
          description: Email verificata con successo — redirect al frontend su `/login?verified=true`.
        '400':
          description: Token mancante, non trovato nel DB, o scaduto (dopo 24h).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Errore interno del server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/google:
    get:
      summary: Avvia il flusso OAuth con Google
      description: |
        Reindirizza il browser dell'utente alla pagina di consenso di Google.
        Al termine, Google chiama il callback `/api/auth/google/callback`.
      tags: [Auth]
      responses:
        '302':
          description: Redirect verso Google OAuth.

  /api/auth/google/callback:
    get:
      summary: Callback OAuth Google
      description: |
        Google reindirizza qui dopo che l'utente ha completato il consenso.
        Il server scambia il codice con i token Google, crea o recupera l'utente,
        e reindirizza il browser verso il frontend con l'`accessToken` come query param.
      tags: [Auth]
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
          description: Codice di autorizzazione restituito da Google.
        - in: query
          name: state
          required: true
          schema:
            type: string
          description: Valore anti-CSRF generato al momento del redirect iniziale.
      responses:
        '302':
          description: Redirect verso il frontend con `accessToken` come query param.
        '400':
          description: Errore nello scambio del codice o dati utente non validi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Il parametro `state` non corrisponde (protezione anti-CSRF).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/github:
    get:
      summary: Avvia il flusso OAuth con GitHub
      description: |
        Reindirizza il browser dell'utente alla pagina di consenso di GitHub.
        Al termine, GitHub chiama il callback `/api/auth/github/callback`.
      tags: [Auth]
      responses:
        '302':
          description: Redirect verso GitHub OAuth.

  /api/auth/github/callback:
    get:
      summary: Callback OAuth GitHub
      description: |
        GitHub reindirizza qui dopo che l'utente ha completato il consenso.
        Il server scambia il codice con i token GitHub, crea o recupera l'utente,
        e reindirizza il browser verso il frontend con l'`accessToken` come query param.
      tags: [Auth]
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
          description: Codice di autorizzazione restituito da GitHub.
        - in: query
          name: state
          required: true
          schema:
            type: string
          description: Valore anti-CSRF generato al momento del redirect iniziale.
      responses:
        '302':
          description: Redirect verso il frontend con `accessToken` come query param.
        '400':
          description: Errore nello scambio del codice o dati utente non validi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Il parametro `state` non corrisponde (protezione anti-CSRF).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==========================================================================
  # TREKS
  # ==========================================================================

  /api/treks:
    get:
      summary: Ottieni tutti i treks (pubblica)
      description: Restituisce la lista completa dei percorsi. Non richiede autenticazione.
      tags: [Treks]
      responses:
        '200':
          description: Lista dei treks.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trek'
        '500':
          description: Errore interno del server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Crea un nuovo trek (solo admin)
      description: |
        Inserisce un nuovo percorso nel database.
        Richiede autenticazione JWT e ruolo `admin`.
        Gli utenti standard riceveranno un errore 403.
      tags: [Treks]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Trek'
      responses:
        '201':
          description: Trek creato con successo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trek'
        '400':
          description: Dati non validi o campi obbligatori mancanti.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token mancante o non valido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Accesso riservato agli amministratori.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/treks/{id}:
    get:
      summary: Ottieni un trek per ID numerico
      description: |
        Cerca il trek tramite il campo numerico `id` (non il campo `_id` di MongoDB).
      tags: [Treks]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID numerico del trek (campo `id` nel DB, non `_id`).
          example: 42
      responses:
        '200':
          description: Trek trovato.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trek'
        '404':
          description: Nessun trek trovato con l'ID specificato.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Errore interno del server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==========================================================================
  # ACTIVITIES
  # ==========================================================================

  /api/activities:
    get:
      summary: Ottieni tutte le attività
      description: Restituisce la lista di tutte le attività/escursioni create dagli utenti.
      tags: [Activities]
      responses:
        '200':
          description: Lista delle attività.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Activity'
        '500':
          description: Errore interno del server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Crea una nuova attività
      description: Crea un'attività/escursione associata a un trek e a un organizzatore.
      tags: [Activities]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Activity'
      responses:
        '201':
          description: Attività creata con successo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
        '400':
          description: Dati non validi o campi obbligatori mancanti.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==========================================================================
  # DIARY
  # ==========================================================================

  /api/diary:
    get:
      summary: Ottieni il diario dell'utente autenticato
      description: |
        Restituisce tutte le voci del diario dell'utente loggato, ordinate per data
        decrescente (max 100 voci). Il campo `trekId` viene popolato con `name`,
        `difficulty`, `duration` e `lengthKm` del trek associato.
        Richiede autenticazione JWT.
      tags: [Diary]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista delle voci del diario.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DiaryEntry'
        '401':
          description: Token mancante o non valido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Errore interno del server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Crea una nuova voce nel diario
      description: |
        Aggiunge una voce al diario personale dell'utente autenticato.
        Il campo `userId` viene impostato automaticamente dal token JWT — non va incluso nel body.
        Il campo `trekId` è opzionale.
        Richiede autenticazione JWT.
      tags: [Diary]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [titolo, data]
              properties:
                titolo:
                  type: string
                  example: "Prima volta alle Odle"
                data:
                  type: string
                  format: date-time
                  example: "2025-06-15T08:00:00Z"
                note:
                  type: string
                  nullable: true
                  example: "Giornata fantastica, cielo limpido."
                foto:
                  type: array
                  items:
                    type: string
                  description: Array di URL o percorsi delle foto.
                  example: ["https://example.com/foto1.jpg"]
                valutazione:
                  type: number
                  minimum: 1
                  maximum: 5
                  nullable: true
                  example: 5
                completato:
                  type: boolean
                  default: true
                  example: true
                trekId:
                  type: string
                  nullable: true
                  description: _id MongoDB del trek associato (opzionale).
                  example: "664b2c3d9e4f5a6b7c8d9e0f"
      responses:
        '201':
          description: Voce del diario creata con successo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiaryEntry'
        '400':
          description: Dati non validi o campi obbligatori mancanti (ValidationError).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token mancante o non valido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Errore interno del server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==========================================================================
  # WEATHER
  # ==========================================================================

  /api/weather/{trekId}:
    get:
      summary: Ottieni il meteo per un trek
      description: |
        Recupera i dati meteo in tempo reale per il trek specificato.
        Il sistema:
        1. Carica il trek dal DB tramite `_id` MongoDB.
        2. Legge le coordinate (`coordinates.lat`, `coordinates.lon`) del trek.
        3. Trova la stazione meteo più vicina dall'elenco in `meteoLocations.json`
           usando la distanza euclidea sulle coordinate.
        4. Scarica e restituisce i dati meteo dalla URL della stazione.

        > **Nota:** la ricerca della stazione più vicina non considera l'altitudine.
      tags: [Weather]
      parameters:
        - in: path
          name: trekId
          required: true
          schema:
            type: string
          description: |
            `_id` MongoDB del trek (NON il campo numerico `id`).
          example: "664b2c3d9e4f5a6b7c8d9e0f"
      responses:
        '200':
          description: Dati meteo recuperati con successo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeatherResponse'
        '404':
          description: Trek non trovato oppure nessuna stazione meteo disponibile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Errore interno del server o errore nella chiamata al provider meteo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==========================================================================
  # USERS
  # ==========================================================================

  /api/users:
    get:
      summary: Ottieni tutti gli utenti
      description: |
        Restituisce la lista completa degli utenti registrati.
        > **Attenzione:** questo endpoint è a uso amministrativo.
        > I campi sensibili (`passwordHash`, `emailVerificationToken`, ecc.) sono esclusi
        > grazie a `select: false` nel modello Mongoose, limitarne l'accesso in produzione.
      tags: [Users]
      responses:
        '200':
          description: Lista utenti.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '500':
          description: Errore interno del server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Crea un utente (CRUD diretto — solo admin)
      description: |
        Inserisce un utente direttamente nel database passando `passwordHash` già calcolato.
        **Non è la registrazione standard**: per creare un account utente usare `/api/auth/register`.
        Questo endpoint è riservato a operazioni amministrative.
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '201':
          description: Utente creato con successo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Dati non validi o campi obbligatori mancanti.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'