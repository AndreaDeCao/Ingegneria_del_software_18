services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env          # legge le variabili da file
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile    # usa il Dockerfile di dev
    container_name: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_API_URL=http://localhost:3000
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge